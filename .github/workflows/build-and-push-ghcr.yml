name: Build and Push GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: lim12137/funasr-npu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SWR_REGISTRY: ${{ secrets.SWR_REGISTRY }}
      SWR_USERNAME: ${{ secrets.SWR_USERNAME }}
      SWR_PASSWORD: ${{ secrets.SWR_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to SWR (optional)
        if: ${{ env.SWR_REGISTRY != '' && env.SWR_USERNAME != '' && env.SWR_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.SWR_REGISTRY }}
          username: ${{ env.SWR_USERNAME }}
          password: ${{ env.SWR_PASSWORD }}

      - name: Warn when SWR secrets are missing
        if: ${{ env.SWR_REGISTRY == '' || env.SWR_USERNAME == '' || env.SWR_PASSWORD == '' }}
        run: |
          echo "::warning::SWR 登录已跳过：未配置 SWR_REGISTRY / SWR_USERNAME / SWR_PASSWORD。"
          echo "::warning::若基础镜像仓库需要鉴权，构建会在拉取 FROM 镜像阶段返回 401。"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
