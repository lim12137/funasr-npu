services:
  funasr-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: cpu
    image: funasr-npu:cpu-local
    container_name: funasr-npu-api-cpu
    restart: unless-stopped
    environment:
      MODEL_DIR: /models
      PORT: "8000"
      ASR_ONNX_PROVIDER: CPU
      ASR_COMMAND_TIMEOUT_SECONDS: "600"
      ASR_UPLOAD_DIR: /tmp/funasr-upload
    ports:
      - "8000:8000"
      - "10095:8000"
    volumes:
      - ./models:/models:ro
