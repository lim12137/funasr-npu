services:
  funasr-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: funasr-npu:local
    container_name: funasr-npu-api
    restart: unless-stopped
    environment:
      MODEL_DIR: /models
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
    devices:
      - /dev/davinci0:/dev/davinci0
      - /dev/davinci_manager:/dev/davinci_manager
      - /dev/devmm_svm:/dev/devmm_svm
      - /dev/hisi_hdc:/dev/hisi_hdc
